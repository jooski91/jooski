
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>제주 여행 플래너</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --paper:#eef2ee;
  --paper2:#e4ebe4;
  --card:#ffffff;
  --ink:#16302c;
  --ink2:#5b6d68;
  --ink3:#93a39d;
  --line:#d7ddd3;
  --accent:#e0672c;
  --accent2:#2f6f68;
  --accent-bg:#fde8db;
  --time-red:#c8422c;
  --next-blue:#2f6fa0;
  --next-blue-bg:#dfeaf4;
  --hdr-bg:#d8ebe0;
  --radius:14px;
  --shadow:0 3px 14px rgba(22,48,44,0.08);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
html,body{height:100%;background:var(--paper);}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard',sans-serif;
  color:var(--ink);font-size:14px;display:flex;flex-direction:column;overflow:hidden;
}
.num{font-variant-numeric:tabular-nums;}

/* ── Header ── */
.hdr{
  padding:calc(9px + var(--safe-top)) 16px 9px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  background:var(--hdr-bg);color:var(--ink);position:relative;
}
.hdr::after{
  content:'';position:absolute;left:0;right:0;bottom:-1px;height:8px;
  background-image:radial-gradient(circle at 8px 0, transparent 6px, var(--hdr-bg) 6.5px);
  background-size:16px 8px;background-repeat:repeat-x;
}
.hdr-plane{font-size:17px;transform:rotate(90deg);flex-shrink:0;opacity:0.9;}
.hdr-text{flex:1;min-width:0;}
.hdr-title{font-size:15.5px;font-weight:600;letter-spacing:-0.2px;}
.hdr-sub{font-size:10.5px;color:var(--ink2);margin-top:1px;}
.hdr-export{
  background:rgba(22,48,44,0.08);border:1px solid rgba(22,48,44,0.16);color:var(--ink);
  font-size:10.5px;padding:5px 9px;border-radius:20px;cursor:pointer;font-family:inherit;flex-shrink:0;
}
.hdr-export:active{background:rgba(22,48,44,0.16);}
.hdr-copy{
  background:rgba(22,48,44,0.08);border:1px solid rgba(22,48,44,0.16);color:var(--ink);
  font-size:10.5px;padding:5px 9px;border-radius:20px;cursor:pointer;font-family:inherit;flex-shrink:0;
}
.hdr-copy:active{background:rgba(22,48,44,0.16);}

/* ── Day tabs (boarding-pass stubs) ── */
.tabs-row{
  display:flex;gap:7px;padding:10px 14px 4px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;
  background:var(--paper);
}
.tabs-row::-webkit-scrollbar{display:none;}
.tab{
  position:relative;flex-shrink:0;background:var(--card);border:1px solid var(--line);
  border-radius:10px;padding:5px 11px;cursor:pointer;min-width:76px;
  box-shadow:0 1px 3px rgba(22,48,44,0.05);
}
.tab.active{border-color:var(--accent2);background:var(--accent2);box-shadow:var(--shadow);}
.tab-day{font-size:8.5px;letter-spacing:1px;color:var(--ink3);font-weight:700;}
.tab.active .tab-day{color:rgba(255,255,255,0.7);}
.tab-date{font-size:13px;font-weight:600;color:var(--ink);margin-top:0;}
.tab.active .tab-date{color:#fff;}
.tab-count{font-size:8.5px;color:var(--ink3);margin-top:0;}
.tab.active .tab-count{color:rgba(255,255,255,0.65);}
.tab-x{
  position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;
  background:var(--ink3);color:#fff;font-size:10px;border:2px solid var(--paper);
  display:none;align-items:center;justify-content:center;cursor:pointer;
}
.tab:hover .tab-x{display:flex;}
.tab-add{
  flex-shrink:0;width:44px;border:1.5px dashed var(--line);border-radius:11px;
  background:none;color:var(--ink3);font-size:18px;cursor:pointer;font-family:inherit;
}
.tab-add:active{background:var(--paper2);}

/* ── Day label (editable) ── */
.day-label-row{padding:10px 18px 2px;display:flex;align-items:baseline;gap:8px;flex-shrink:0;}
.day-label-input{
  font-size:19px;font-weight:600;border:none;background:none;
  color:var(--ink);flex:1;min-width:0;padding:2px 0;border-bottom:1.5px solid transparent;
}
.day-label-input:focus{outline:none;border-bottom-color:var(--accent2);}
.day-meta{font-size:11.5px;color:var(--ink3);}

/* ── Day note (오늘의 메모) ── */
.day-note-wrap{padding:8px 18px 0;flex-shrink:0;}
.day-note-box{
  background:#fffaea;border:1.75px dashed #e8cf8a;border-radius:12px;
  padding:9px 12px 10px;position:relative;transform:rotate(-0.3deg);
  box-shadow:0 2px 8px rgba(179,134,44,0.08);
}
.day-note-label{
  font-size:11.5px;font-weight:700;color:#b3862c;display:flex;align-items:baseline;gap:5px;margin-bottom:4px;
}
.day-note-sub{font-size:10px;font-weight:500;color:#c4a05c;}
.day-note-input{
  width:100%;box-sizing:border-box;border:none;padding:0;
  font-size:13px;font-family:inherit;color:var(--ink);background:transparent;resize:none;line-height:1.55;
}
.day-note-input:focus{outline:none;}
.day-note-input::placeholder{color:#c9b273;}

/* ── Timeline ── */
.timeline-scroll{flex:1;overflow-y:auto;padding:8px 0 calc(90px + var(--safe-bottom));}
.timeline{position:relative;padding:30px 18px 0 54px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--ink3);}
.empty-state .es-icon{font-size:30px;margin-bottom:10px;}
.empty-state p{font-size:13px;line-height:1.7;}

.stop{position:relative;padding-bottom:10px;}
.stop-line{
  position:absolute;left:-32px;top:14px;bottom:-10px;width:0;
  border-left:2px dashed var(--line);
}
.stop:last-child .stop-line{display:none;}
.stop-dot{
  position:absolute;left:-38px;top:6px;width:13px;height:13px;border-radius:50%;
  border:2.5px solid var(--card);box-shadow:0 0 0 1.5px currentColor;
}
.stop-time{
  position:absolute;left:-160px;top:0;width:96px;text-align:right;
  font-size:15px;font-weight:600;color:var(--ink);
  display:none;
}
.gap-label{
  font-size:11px;font-weight:700;color:var(--accent2);background:rgba(47,111,104,0.11);
  padding:4px 11px;border-radius:20px;margin:2px 0 10px;display:inline-flex;align-items:center;gap:4px;
}

.card{
  background:var(--card);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);
  cursor:pointer;border:1px solid transparent;
}
.card:active{border-color:var(--line);}
.card.done{opacity:0.55;}
.card.next-up{border-color:var(--next-blue);box-shadow:var(--shadow),0 0 0 2px var(--next-blue-bg);animation:nextPulse 1.8s ease-in-out infinite;}
@keyframes nextPulse{
  0%,100%{box-shadow:var(--shadow),0 0 0 2px var(--next-blue-bg);}
  50%{box-shadow:var(--shadow),0 0 0 5px var(--next-blue-bg),0 0 10px 2px rgba(47,111,160,0.35);}
}
.here-walker{
  position:absolute;left:-50px;top:-24px;font-size:28px;line-height:1;z-index:2;
  animation:walkerBounce 1.4s ease-in-out infinite;
}
@keyframes walkerBounce{
  0%,100%{transform:scaleX(-1) translateY(0) rotate(4deg);}
  50%{transform:scaleX(-1) translateY(-5px) rotate(-4deg);}
}
.card.done .card-name{text-decoration:line-through;text-decoration-color:var(--ink3);}
.stop-dot.done{background:currentColor;}
.check-btn{
  width:22px;height:22px;border-radius:7px;border:1.75px solid var(--line);background:#fff;
  color:transparent;font-size:13px;font-weight:800;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;padding:0;transition:background .15s,border-color .15s,color .15s;
}
.check-btn.checked{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.check-btn:active{border-color:var(--accent2);}
.check-label{font-size:10px;color:var(--ink3);cursor:pointer;flex-shrink:0;}
.card-top{display:flex;align-items:center;gap:8px;}
.card-time{font-weight:600;font-size:15px;flex-shrink:0;color:var(--time-red);}
.chip{
  font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;flex-shrink:0;
  display:inline-flex;align-items:center;gap:3px;
}
.card-actions{margin-left:auto;display:flex;gap:2px;flex-shrink:0;}
.icon-btn{
  width:24px;height:24px;border:none;background:none;color:var(--ink3);font-size:13px;
  cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;
}
.icon-btn:active{background:var(--paper2);}
.icon-btn.danger:active{color:var(--accent);background:var(--accent-bg);}
.card-name{font-size:14.5px;font-weight:700;color:var(--ink);margin-top:6px;line-height:1.4;}
.card-memo{
  font-size:12px;color:#8a6a2a;margin-top:7px;line-height:1.5;white-space:pre-wrap;
  background:#fffaea;border:1.5px dashed #e8cf8a;border-radius:10px;padding:7px 10px;
}

/* ── Add trigger ── */
.add-trigger{
  display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:var(--radius);
  border:1.5px dashed var(--line);color:var(--ink3);font-size:13px;cursor:pointer;
  background:transparent;width:100%;font-family:inherit;
}
.add-trigger:active{background:var(--card);border-color:var(--accent2);color:var(--accent2);}

/* ── Composer (inline add/edit form) ── */
.composer{
  background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);
  border:1.5px solid var(--accent2);
}
.composer-row{display:flex;gap:8px;margin-bottom:8px;}
.composer-row:last-of-type{margin-bottom:0;}
.f-time-box{
  width:128px;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:2px;
  padding:9px 4px;border:1px solid var(--line);border-radius:9px;background:var(--paper);
}
.f-time-box:focus-within{border-color:var(--accent2);background:#fff;}
.f-time-sel{
  border:none;background:transparent;font-size:14px;font-weight:600;color:var(--ink);
  font-family:inherit;text-align:center;cursor:pointer;padding:0;max-width:52px;
}
.f-time-sel:focus{outline:none;}
.f-time-sep{color:var(--ink3);font-weight:600;font-size:13px;}
.f-name-wrap{flex:1;position:relative;min-width:0;}
.f-name{
  width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:9px;
  font-size:14px;font-family:inherit;color:var(--ink);background:var(--paper);
}
.f-name:focus{outline:none;border-color:var(--accent2);background:#fff;}
.memo-box{
  background:#fffaea;border:1.5px dashed #e8cf8a;border-radius:12px;
  padding:9px 11px 10px;position:relative;transform:rotate(-0.35deg);
  width:100%;box-sizing:border-box;
}
.memo-label{
  font-size:10.5px;font-weight:700;color:#b3862c;display:flex;align-items:center;gap:4px;margin-bottom:4px;
}
.f-memo{
  width:100%;border:none;border-radius:0;padding:0;
  font-size:12.5px;font-family:inherit;color:var(--ink);background:transparent;resize:none;line-height:1.5;
}
.f-memo:focus{outline:none;background:transparent;}
.suggest{
  position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--line);
  border-radius:10px;box-shadow:var(--shadow);max-height:170px;overflow-y:auto;z-index:20;display:none;
}
.suggest.show{display:block;}
.suggest-item{padding:9px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.suggest-item:active{background:var(--paper2);}
.cat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.cat-pick{
  font-size:11.5px;padding:6px 10px;border-radius:20px;border:1.5px solid var(--line);
  background:#fff;color:var(--ink2);cursor:pointer;font-family:inherit;
}
.cat-pick.sel{border-color:currentColor;font-weight:700;}
.composer-btns{display:flex;gap:8px;margin-top:10px;}
.btn{
  flex:1;padding:10px;border-radius:9px;border:none;font-size:13.5px;font-weight:600;
  cursor:pointer;font-family:inherit;
}
.btn-save{background:var(--accent2);color:#fff;}
.btn-save:active{background:#255a54;}
.btn-cancel{background:var(--paper2);color:var(--ink2);}
.btn-cancel:active{background:var(--line);}

/* ── Toast ── */
.toast{
  position:fixed;left:50%;bottom:calc(24px + var(--safe-bottom));transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:10px 16px;border-radius:24px;font-size:12.5px;
  display:flex;align-items:center;gap:10px;box-shadow:0 4px 18px rgba(0,0,0,0.25);
  opacity:0;pointer-events:none;transition:all .25s;z-index:200;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
.toast-undo{color:#ffd4ba;font-weight:700;cursor:pointer;background:none;border:none;font-size:12.5px;font-family:inherit;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-plane">✈</div>
  <div class="hdr-text">
    <div class="hdr-title">제주 여행 플래너</div>
    <div class="hdr-sub" id="hdr-sub"></div>
  </div>
  <button class="hdr-copy" onclick="copyPlanText()" title="정리된 텍스트로 복사">복사</button>
  <button class="hdr-export" onclick="exportPlan()">내보내기</button>
</div>

<div class="tabs-row" id="tabs-row"></div>

<div class="day-label-row">
  <input class="day-label-input" id="day-label-input" oninput="renameActiveDay(this.value)" placeholder="날짜 라벨 (예: 7/9(목))"/>
  <div class="day-meta" id="day-meta"></div>
</div>

<div class="day-note-wrap" id="day-note-wrap">
  <div class="day-note-box">
    <div class="day-note-label">📌 오늘의 메모 <span class="day-note-sub">— 꼭 기억해야 할 것들</span></div>
    <textarea class="day-note-input" id="day-note-input" rows="2" placeholder="예: 렌트카 반납 전 주유하기, 우산 챙기기..." oninput="updateDayNote(this.value)"></textarea>
  </div>
</div>

<div class="timeline-scroll" id="timeline-scroll">
  <div class="timeline" id="timeline"></div>
</div>

<div class="toast" id="toast">
  <span id="toast-msg"></span>
  <button class="toast-undo" id="toast-undo" onclick="undoDelete()">되돌리기</button>
</div>

<script id="sdb">
/* 저장된 상태 - 자동 저장됩니다 */
const _SAVED_STATE = {"days": [{"id": 1, "label": "7/9(목)", "places": [{"id": 1, "name": "김포공항 도착 & 주차", "cat": "관광", "time": "11:30", "memo": ""}, {"id": 2, "name": "탑승 수속", "cat": "관광", "time": "11:50", "memo": "출발 30분 전까지 완료"}, {"id": 3, "name": "진에어 LJ423 탑승", "cat": "액티비티", "time": "12:30", "memo": "12:30 출발 → 13:35 제주 도착"}, {"id": 4, "name": "렌트카 인수 & 카시트 장착", "cat": "관광", "time": "14:00", "memo": ""}, {"id": 5, "name": "도도리 고기국수", "cat": "맛집", "time": "15:00", "memo": "예약 안됨 / 애견동반 X"}, {"id": 6, "name": "동문재래시장 공영주차장 이동", "cat": "관광", "time": "16:00", "memo": "12~25분 소요"}, {"id": 7, "name": "동문시장 구경 (아베베 베이커리)", "cat": "쇼핑", "time": "16:20", "memo": "17:20까지 / 아베베 베이커리 유명"}, {"id": 8, "name": "다이소 용담해안도로점 이동", "cat": "관광", "time": "17:20", "memo": "17분 소요"}, {"id": 9, "name": "용담해안도로 드라이브 & 다이소", "cat": "관광", "time": "17:30", "memo": "18:00까지 / 사진 찍기 좋음, 듀포레 카페도 가능"}, {"id": 10, "name": "논짓물 이동", "cat": "관광", "time": "18:00", "memo": "3분 소요"}, {"id": 11, "name": "논짓물 (갈치조림)", "cat": "맛집", "time": "18:30", "memo": "예약 완료 / 애견동반 X"}, {"id": 12, "name": "남편 도착 & 픽업", "cat": "관광", "time": "20:35", "memo": ""}, {"id": 13, "name": "숙소 도착", "cat": "숙소", "time": "21:30", "memo": "다음날 먹을거 생각 / 구매하기"}]}, {"id": 2, "label": "7/10(금)", "places": [{"id": 14, "name": "숙소에서 아침 식사", "cat": "맛집", "time": "09:00", "memo": "10:20까지 간단하게 먹고 출발"}, {"id": 15, "name": "카페 을리 이동", "cat": "카페", "time": "10:30", "memo": "11분 소요"}, {"id": 16, "name": "카페 을리", "cat": "카페", "time": "10:40", "memo": "11:40까지 / 실내 애견동반 가능"}, {"id": 17, "name": "길갈팜랜드 이동", "cat": "액티비티", "time": "11:40", "memo": "1시간 소요"}]}], "activeDayId": 1, "nextId": 18, "nextDayId": 3};
</script>

<script>
// ══════════════════════════════════════════════
// 장소 DB (자동완성용)
// ══════════════════════════════════════════════
const DB_NAMES = [
  '제주국제공항','김포공항','제주항','성산일출봉','우도','섭지코지','광치기해변','월정리해변','함덕해수욕장',
  '비자림','만장굴','산굼부리','협재해수욕장','금능해수욕장','한림공원','애월해안도로','곽지해수욕장',
  '이호테우해변','새별오름','수월봉','신창풍차해안','오설록티뮤지엄','신화월드','카멜리아힐','중문해수욕장',
  '천제연폭포','천지연폭포','정방폭포','외돌개','서귀포매일올레시장','산방산','용머리해안','송악산',
  '한라산','사려니숲길','동문시장','용두암','도두봉'
];

const CAT_META = {
  '관광':   {emoji:'🏔', fg:'#2f6f68', bg:'#e3efec'},
  '맛집':   {emoji:'🍜', fg:'#c1502f', bg:'#f7e6df'},
  '카페':   {emoji:'☕', fg:'#a9720f', bg:'#f6ecd8'},
  '숙소':   {emoji:'🏨', fg:'#3b4d8a', bg:'#e6e9f6'},
  '쇼핑':   {emoji:'🛍', fg:'#a03566', bg:'#f5e3ec'},
  '액티비티':{emoji:'🏄', fg:'#1f6fa0', bg:'#dcedf6'},
};
const CAT_LIST = Object.keys(CAT_META);

// ══════════════════════════════════════════════
// State
// ══════════════════════════════════════════════
let days=[{id:1,label:'1일차',places:[],note:''}];
let activeDayId=1;
let nextId=1;
let nextDayId=2;

if(typeof _SAVED_STATE!=='undefined' && _SAVED_STATE){
  days=_SAVED_STATE.days||days;
  activeDayId=_SAVED_STATE.activeDayId||days[0].id;
  nextId=_SAVED_STATE.nextId||100;
  nextDayId=_SAVED_STATE.nextDayId||days.length+1;
}

let editingId=null;   // null | 'new' | placeId  → 어떤 카드가 편집 폼으로 열려있는지
let editCat='관광';
let lastDeleted=null; // {dayId, index, place} → 되돌리기용
let toastTimer=null;

function getDay(id){return days.find(d=>d.id===id);}
function getActive(){return getDay(activeDayId);}
function autoSave(){
  try{ localStorage.setItem('jeju_planner_v2', JSON.stringify({days,activeDayId,nextId,nextDayId})); }catch(e){}
}

// ══════════════════════════════════════════════
// Render: Day tabs
// ══════════════════════════════════════════════
function renderTabs(){
  const wrap=document.getElementById('tabs-row');
  wrap.innerHTML='';
  days.forEach(d=>{
    const short=(d.label||'').replace(/[()]/g,'').trim();
    const el=document.createElement('div');
    el.className='tab'+(d.id===activeDayId?' active':'');
    el.innerHTML=`
      <div class="tab-day">DAY ${days.indexOf(d)+1}</div>
      <div class="tab-date">${short||'날짜 없음'}</div>
      <div class="tab-count">${d.places.length}곳</div>
      ${days.length>1?`<div class="tab-x" onclick="event.stopPropagation();deleteDay(${d.id})">×</div>`:''}
    `;
    el.onclick=()=>{ activeDayId=d.id; editingId=null; renderAll(); };
    wrap.appendChild(el);
  });
  const add=document.createElement('button');
  add.className='tab-add';
  add.textContent='+';
  add.title='날짜 추가';
  add.onclick=addDay;
  wrap.appendChild(add);
}

function addDay(){
  const id=nextDayId++;
  days.push({id,label:'새 날짜',places:[],note:''});
  activeDayId=id;
  editingId=null;
  renderAll();
  setTimeout(()=>{ const inp=document.getElementById('day-label-input'); inp.focus(); inp.select(); },50);
}
function deleteDay(id){
  if(days.length<=1)return;
  if(!confirm('이 날짜와 모든 일정을 삭제할까요?'))return;
  days=days.filter(d=>d.id!==id);
  if(activeDayId===id) activeDayId=days[0].id;
  editingId=null;
  renderAll();
}
function renameActiveDay(val){
  const d=getActive();
  if(!d)return;
  d.label=val;
  renderTabs();
  autoSave();
}
function updateDayNote(val){
  const d=getActive();
  if(!d)return;
  d.note=val;
  autoSave();
}

// ══════════════════════════════════════════════
// Render: Timeline
// ══════════════════════════════════════════════
function tdiff(a,b){
  const [ah,am]=a.split(':').map(Number),[bh,bm]=b.split(':').map(Number);
  return(bh*60+bm)-(ah*60+am);
}
function fmtDur(m){
  if(m<60)return `${m}분`;
  const h=Math.floor(m/60),mm=m%60;
  return h+'시간'+(mm?` ${mm}분`:'');
}

function renderTimeline(){
  const d=getActive();
  document.getElementById('day-label-input').value=d?d.label:'';
  document.getElementById('day-meta').textContent=d?`${d.places.length}개 일정`:'';
  document.getElementById('day-note-input').value=d?(d.note||''):'';

  const box=document.getElementById('timeline');
  box.innerHTML='';
  if(!d){ return; }

  if(d.places.length===0 && editingId!=='new'){
    box.innerHTML=`<div class="empty-state"><div class="es-icon">🧳</div><p>아직 일정이 없어요<br>아래 버튼으로 첫 일정을 추가해보세요</p></div>`;
  } else {
    const nextUpId = (d.places.find(p=>!p.done)||{}).id;
    d.places.forEach((p,i)=>{
      if(i>0){
        const prev=d.places[i-1];
        if(prev.time && p.time){
          const m=tdiff(prev.time,p.time);
          if(m>0) box.appendChild(el(`<div class="gap-label">⏱ ${fmtDur(m)} 후</div>`));
        }
      }
      const stop=document.createElement('div');
      stop.className='stop';
      const meta=CAT_META[p.cat]||CAT_META['관광'];

      if(editingId===p.id){
        stop.innerHTML=`<div class="stop-line"></div><div class="stop-dot" style="color:${meta.fg}"></div>`;
        stop.appendChild(composerNode(p));
      } else {
        stop.innerHTML=`
          <div class="stop-line"></div>
          <div class="stop-dot${p.done?' done':''}" style="color:${meta.fg}"></div>
          ${p.id===nextUpId?'<div class="here-walker">🚶</div>':''}
          <div class="card${p.done?' done':''}${p.id===nextUpId?' next-up':''}" data-id="${p.id}">
            <div class="card-top">
              ${p.time?`<span class="card-time">⏰ ${p.time}</span>`:`<span class="card-time" style="color:var(--ink3)">⏰ --:--</span>`}
              <button class="check-btn${p.done?' checked':''}" title="완료 체크" onclick="event.stopPropagation();togglePlaceDone(${d.id},${p.id})">✓</button>
              ${!p.done?`<span class="check-label" onclick="event.stopPropagation();togglePlaceDone(${d.id},${p.id})">완료</span>`:''}
              <div class="card-actions">
                <button class="icon-btn danger" title="삭제" onclick="event.stopPropagation();deletePlace(${d.id},${p.id})">✕</button>
              </div>
            </div>
            <div class="card-name"><span style="color:${meta.fg}">✅</span> ${escapeHtml(p.name)}</div>
            ${p.memo?`<div class="card-memo">${escapeHtml(p.memo)}</div>`:''}
          </div>
        `;
        stop.querySelector('.card').onclick=()=>openEdit(p.id);
      }
      box.appendChild(stop);
    });
  }

  // 하단: 추가 트리거 또는 새 일정 컴포저
  const addStop=document.createElement('div');
  addStop.className='stop';
  addStop.style.paddingBottom='4px';
  if(editingId==='new'){
    addStop.innerHTML=`<div class="stop-dot" style="color:var(--accent2)"></div>`;
    addStop.appendChild(composerNode(null));
  } else {
    addStop.innerHTML=`<div class="stop-dot" style="color:var(--ink3);opacity:.4"></div>`;
    const btn=document.createElement('button');
    btn.className='add-trigger';
    btn.innerHTML='＋ 일정 추가';
    btn.onclick=()=>{ editingId='new'; renderTimeline(); setTimeout(()=>document.getElementById('f-name')?.focus(),50); };
    addStop.appendChild(btn);
  }
  box.appendChild(addStop);
}

function nowTimeStr(){ const n=new Date(); return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); }
function el(html){ const d=document.createElement('div'); d.innerHTML=html; return d.firstElementChild; }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ══════════════════════════════════════════════
// Composer (inline add/edit form)
// ══════════════════════════════════════════════
function composerNode(p){
  editCat = p ? p.cat : editCat;
  const wrap=document.createElement('div');
  wrap.className='composer';
  wrap.innerHTML=`
    <div class="composer-row">
      <div class="f-time-box" id="f-time-box">
        <select class="f-time-sel" id="f-time-h"></select>
        <span class="f-time-sep">:</span>
        <select class="f-time-sel" id="f-time-m"></select>
      </div>
      <div class="f-name-wrap">
        <input class="f-name" id="f-name" placeholder="장소 이름" value="${p?escapeHtml(p.name):''}" autocomplete="off"/>
        <div class="suggest" id="f-suggest"></div>
      </div>
    </div>
    <div class="composer-row">
      <div class="memo-box">
        <div class="memo-label">📝 메모</div>
        <textarea class="f-memo" id="f-memo" rows="2" placeholder="예약, 이동시간, 특이사항 등">${p?escapeHtml(p.memo):''}</textarea>
      </div>
    </div>
    <div class="composer-btns">
      <button class="btn btn-cancel" onclick="closeComposer()">취소</button>
      <button class="btn btn-save" onclick="saveComposer(${p?p.id:'null'})">${p?'저장':'추가'}</button>
    </div>
  `;
  const initTime=(p?(p.time||''):nowTimeStr())||nowTimeStr();
  const [initH,initM]=initTime.split(':');
  const hSel=wrap.querySelector('#f-time-h');
  const mSel=wrap.querySelector('#f-time-m');
  for(let h=0;h<24;h++){
    const v=String(h).padStart(2,'0');
    hSel.innerHTML+=`<option value="${v}"${v===initH?' selected':''}>${v}시</option>`;
  }
  for(let m=0;m<60;m++){
    const v=String(m).padStart(2,'0');
    mSel.innerHTML+=`<option value="${v}"${v===initM?' selected':''}>${v}분</option>`;
  }
  const nameInp=wrap.querySelector('#f-name');
  const sugBox=wrap.querySelector('#f-suggest');
  nameInp.addEventListener('input',()=>{
    const q=nameInp.value.trim();
    if(!q){ sugBox.classList.remove('show'); sugBox.innerHTML=''; return; }
    const matches=DB_NAMES.filter(n=>n.includes(q)).slice(0,6);
    if(matches.length===0){ sugBox.classList.remove('show'); return; }
    sugBox.innerHTML=matches.map(n=>`<div class="suggest-item">📍 ${n}</div>`).join('');
    [...sugBox.children].forEach((c,i)=>{
      c.onclick=()=>{ nameInp.value=matches[i]; sugBox.classList.remove('show'); sugBox.innerHTML=''; };
    });
    sugBox.classList.add('show');
  });
  wrap.addEventListener('keydown',(e)=>{
    if(e.key==='Enter' && e.target.id!=='f-memo'){ e.preventDefault(); saveComposer(p?p.id:null); }
    if(e.key==='Escape'){ closeComposer(); }
  });
  return wrap;
}

function openEdit(id){
  editingId=id;
  renderTimeline();
  setTimeout(()=>document.getElementById('f-name')?.focus(),50);
}
function closeComposer(){
  editingId=null;
  renderTimeline();
}
function saveComposer(id){
  const d=getActive();
  if(!d)return;
  const name=document.getElementById('f-name').value.trim();
  if(!name){ document.getElementById('f-name').focus(); return; }
  const time=document.getElementById('f-time-h').value+':'+document.getElementById('f-time-m').value;
  const memo=document.getElementById('f-memo').value.trim();
  if(id===null||id===undefined){
    d.places.push({id:nextId++,name,cat:editCat,time,memo});
  } else {
    const p=d.places.find(pl=>pl.id===id);
    if(p){ p.name=name; p.cat=editCat; p.time=time; p.memo=memo; }
  }
  sortDayByTime(d);
  editingId=null;
  renderAll();
}
function sortDayByTime(d){
  d.places.sort((a,b)=>{
    if(!a.time && !b.time) return 0;
    if(!a.time) return 1;
    if(!b.time) return -1;
    return a.time.localeCompare(b.time);
  });
}

// ══════════════════════════════════════════════
// Delete / Reorder
// ══════════════════════════════════════════════
function deletePlace(dayId,placeId){
  const d=getDay(dayId);
  if(!d)return;
  const idx=d.places.findIndex(p=>p.id===placeId);
  if(idx<0)return;
  lastDeleted={dayId,index:idx,place:d.places[idx]};
  d.places.splice(idx,1);
  if(editingId===placeId) editingId=null;
  renderAll();
  showToast(`'${lastDeleted.place.name}' 삭제됨`,true);
}
function undoDelete(){
  if(!lastDeleted)return;
  const d=getDay(lastDeleted.dayId);
  if(d){
    d.places.splice(lastDeleted.index,0,lastDeleted.place);
    if(d.id===activeDayId) renderAll(); else renderTabs();
  }
  lastDeleted=null;
  hideToast();
}
function togglePlaceDone(dayId,placeId){
  const d=getDay(dayId);
  if(!d)return;
  const p=d.places.find(pl=>pl.id===placeId);
  if(!p)return;
  p.done=!p.done;
  renderAll();
}

// ══════════════════════════════════════════════
// Toast
// ══════════════════════════════════════════════
function showToast(msg,withUndo){
  clearTimeout(toastTimer);
  document.getElementById('toast-msg').textContent=msg;
  document.getElementById('toast-undo').style.display=withUndo?'inline':'none';
  document.getElementById('toast').classList.add('show');
  toastTimer=setTimeout(hideToast,4500);
}
function hideToast(){
  document.getElementById('toast').classList.remove('show');
}

// ══════════════════════════════════════════════
// 정리된 텍스트로 복사 (카톡 등에 붙여넣기용)
// ══════════════════════════════════════════════
function buildPlanText(){
  const total=days.reduce((s,d)=>s+d.places.length,0);
  let t=`🍊 제주 여행 플래너\n`;
  t+=`${days.length}일 · 총 ${total}개 일정\n`;
  t+='─'.repeat(24)+'\n';
  days.forEach(d=>{
    t+=`\n📅 ${d.label||'날짜 미정'}\n`;
    if(d.note&&d.note.trim()) t+=`📌 오늘의 메모: ${d.note.trim()}\n`;
    if(d.places.length===0){ t+='  (일정 없음)\n'; return; }
    d.places.forEach(p=>{
      const meta=CAT_META[p.cat]||CAT_META['관광'];
      t+=`${p.done?'✅':'▫️'} ${p.time?p.time:'--:--'}  ${meta.emoji} ${p.name}`;
      if(p.memo) t+=`\n        ↳ ${p.memo}`;
      t+='\n';
    });
  });
  return t;
}
function copyPlanText(){
  const text=buildPlanText();
  const done=()=>showToast('일정을 복사했어요 · 붙여넣기 하세요',false);
  const fail=()=>fallbackCopy(text,done);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(fail);
  } else {
    fallbackCopy(text,done);
  }
}
function fallbackCopy(text,done){
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.position='fixed';
  ta.style.left='-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try{ document.execCommand('copy'); done(); }
  catch(e){ showToast('복사에 실패했어요',false); }
  document.body.removeChild(ta);
}

// ══════════════════════════════════════════════
// Export (자체 완결 HTML 파일로 저장)
// ══════════════════════════════════════════════
function exportPlan(){
  const html=document.documentElement.outerHTML;
  const stateStr=JSON.stringify({days,activeDayId,nextId,nextDayId});
  const patched=html.replace(
    /const _SAVED_STATE = .*?;/s,
    `const _SAVED_STATE = ${stateStr};`
  );
  const blob=new Blob([`<!DOCTYPE html>\n${patched}`],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='제주여행플래너.html';
  a.click();
  URL.revokeObjectURL(url);
  showToast('파일로 저장했어요',false);
}

// ══════════════════════════════════════════════
// Header sub / Init
// ══════════════════════════════════════════════
function updateHdrSub(){
  const total=days.reduce((s,d)=>s+d.places.length,0);
  document.getElementById('hdr-sub').textContent=`${days.length}일 · 총 ${total}개 일정`;
}

function renderAll(){
  renderTabs();
  renderTimeline();
  updateHdrSub();
  autoSave();
}

document.addEventListener('DOMContentLoaded',()=>{
  if(!(typeof _SAVED_STATE!=='undefined' && _SAVED_STATE)){
    try{
      const saved=localStorage.getItem('jeju_planner_v2');
      if(saved){
        const s=JSON.parse(saved);
        days=s.days||days; activeDayId=s.activeDayId||days[0].id;
        nextId=s.nextId||100; nextDayId=s.nextDayId||days.length+1;
      }
    }catch(e){}
  }
  if(!getActive()) activeDayId=days[0].id;
  renderAll();
});
</script>
